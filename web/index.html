<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>WWII Tanks — Isometric Simulator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🚜</text></svg>" />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e10; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #hud {
      position: fixed; inset: 0; pointer-events: none;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: #e8ecd8; text-shadow: 0 1px 2px rgba(0,0,0,.8);
      user-select: none;
    }
    #controls {
      position: absolute; top: 16px; left: 18px; font-size: 13px; line-height: 1.5;
      opacity: .9;
    }
    #controls b { color: #ffe08a; letter-spacing: 1px; }
    #status {
      position: absolute; top: 118px; left: 18px; font-size: 18px; font-weight: 700;
      letter-spacing: .5px;
    }
    #hpbar {
      position: absolute; top: 150px; left: 18px; width: 240px; height: 14px;
      border: 1px solid rgba(255,255,255,.35); border-radius: 3px; overflow: hidden;
      background: rgba(0,0,0,.35);
    }
    #hpfill { height: 100%; width: 100%; background: linear-gradient(90deg,#7ac74f,#b6e36a); transition: width .12s linear; }
    #banner {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 64px; font-weight: 800; letter-spacing: 4px; opacity: 0;
      transition: opacity .4s ease; text-align: center;
    }
    #banner small { display:block; font-size: 18px; font-weight: 600; letter-spacing: 1px; opacity:.85; margin-top: 10px; }
    #hint {
      position: absolute; bottom: 14px; left: 0; right: 0; text-align: center;
      font-size: 12px; opacity: .55;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="controls">
      <b>WWII TANKS</b><br>
      W/S drive &nbsp; A/D steer<br>
      Mouse aim &nbsp; Click / Space fire<br>
      RMB orbit &nbsp; MMB / arrows pan &nbsp; Wheel zoom
    </div>
    <div id="status">HULL 100% &nbsp; ENEMIES 4</div>
    <div id="hpbar"><div id="hpfill"></div></div>
    <div id="banner"></div>
    <div id="hint">Fight alongside your allies · destroy cover · break tracks &amp; blow turrets · crews bail out and fight on</div>
  </div>
  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.min.js" } }
  </script>
  <script type="module" src="./game.js"></script>
</body>
</html>
