name: Build HTML5 bundle

# Builds the Defold project into an HTML5 bundle and (optionally) deploys it to
# Vercel. Deployment runs only when the VERCEL_TOKEN secret is configured.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build HTML5 bundle
        run: ./tools/build_html5.sh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: wwiitanks-html5
          path: dist

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel
          vercel deploy ./dist --prod --yes --token "$VERCEL_TOKEN"
